<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
}

.bubble{
  width:90%;
  max-width:600px;
  background:#fff;
  border-radius:24px;
  padding:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  display:flex;
  justify-content:center;
}

.bubble img{
  width:90%;
  max-width:300px;
  border-radius:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bubble">
  <img id="photo"
  src="https://i.pinimg.com/1200x/1b/a9/fd/1ba9fd5faf0ab4a0ba8c9121dcc653e7.jpg">
</div>

<script>
const images = [
"images/Si.png"
];

let index = 0;
const photo = document.getElementById("photo");

photo.addEventListener("click", () => {
  index = (index + 1) % images.length;
  photo.src = images[index];
});
</script>

</body>
</html>
